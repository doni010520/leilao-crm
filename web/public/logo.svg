<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" role="img" aria-label="ImobLeilão CRM">
  <defs>
    <style>
      .wm { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: -0.3px; }
    </style>
  </defs>

  <!-- === ICON (48x48 area) === -->
  <g id="icon">
    <rect x="4" y="4" width="40" height="40" rx="9.5" fill="#1a3c34"/>
    <!-- House body -->
    <rect x="12" y="22" width="24" height="16" rx="1.2" fill="#fff"/>
    <!-- Roof / gavel head: thick golden chevron -->
    <path d="M8 24L24 13L40 24" fill="none" stroke="#c8911f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Gavel handle from peak -->
    <line x1="24" y1="13" x2="34" y2="5.5" stroke="#c8911f" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Impact arc -->
    <path d="M36 8a4 4 0 0 1 2-3.5" fill="none" stroke="#c8911f" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <!-- Door with arch -->
    <path d="M21 38v-7.5a3 3 0 0 1 6 0V38" fill="#1a3c34"/>
    <!-- Window left -->
    <rect x="13.5" y="24.5" width="4.5" height="3.8" rx="0.8" fill="#1a3c34" opacity="0.55"/>
    <!-- Window right -->
    <rect x="30" y="24.5" width="4.5" height="3.8" rx="0.8" fill="#1a3c34" opacity="0.55"/>
  </g>

  <!-- === WORDMARK === -->
  <g id="lockup">
    <use href="#icon"/>
    <!-- "ImobLeilão" in brand green -->
    <text x="54" y="31" class="wm" fill="#1a3c34">ImobLeilão</text>
    <!-- "CRM" in gold accent -->
    <text x="185" y="31" class="wm" fill="#c8911f">CRM</text>
    <!-- Subtle gold underline -->
    <line x1="54" y1="36" x2="225" y2="36" stroke="#c8911f" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
