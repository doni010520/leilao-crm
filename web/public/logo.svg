<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 40" role="img" aria-label="ImobLeilão CRM">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3c34"/>
      <stop offset="100%" stop-color="#14302a"/>
    </linearGradient>
  </defs>

  <!-- === ICON (40x40) === -->
  <g id="icon">
    <rect width="40" height="40" rx="10" fill="url(#g)"/>
    <!-- "I" vertical bar = left wall -->
    <rect x="10" y="10" width="5.5" height="21" rx="1.2" fill="#ffffff"/>
    <!-- "L" floor + right wall -->
    <rect x="10" y="26" width="20" height="5" rx="1.2" fill="#ffffff"/>
    <rect x="24.5" y="15" width="5.5" height="16" rx="1.2" fill="#ffffff"/>
    <!-- Roof: golden chevron -->
    <path d="M10 11.5L20 4.5L30 11.5" fill="none" stroke="#c8911f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="52" y="22" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="800" font-size="18" letter-spacing="-0.3" fill="#1a3c34">
    ImobLeilão
  </text>
  <text x="52" y="35" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="700" font-size="11" letter-spacing="3" fill="#c8911f">
    CRM
  </text>
</svg>
