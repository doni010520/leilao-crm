<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48">
  <defs>
    <style>
      .icon-bg { fill: #1a3c34; }
      .gold { fill: #c8911f; }
      .white { fill: #ffffff; }
      .wordmark { fill: #1a3c34; font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 21px; letter-spacing: -0.5px; }
      .wordmark-accent { fill: #c8911f; }
    </style>
  </defs>

  <!-- ICON-ONLY VERSION (48x48 with padding, icon area 40x40) -->
  <g id="icon">
    <!-- Rounded square background -->
    <rect x="4" y="4" width="40" height="40" rx="9" class="icon-bg"/>

    <!-- Building / house silhouette -->
    <polygon points="24,14 14,22 14,34 34,34 34,22" class="white"/>
    <!-- Roof peak accent -->
    <polygon points="24,14 14,22 34,22" class="gold" opacity="0.25"/>
    <!-- Door -->
    <rect x="21.5" y="27" width="5" height="7" class="icon-bg"/>
    <!-- Window left -->
    <rect x="16" y="24.5" width="3.5" height="3" rx="0.5" class="icon-bg"/>
    <!-- Window right -->
    <rect x="28.5" y="24.5" width="3.5" height="3" rx="0.5" class="icon-bg"/>

    <!-- Gavel — angled at top-right corner -->
    <!-- Handle (diagonal bar) -->
    <rect x="27" y="8" width="2.4" height="11" rx="1.2" class="gold" transform="rotate(-40, 28.2, 13.5)"/>
    <!-- Hammer head (horizontal block at top of handle) -->
    <rect x="25.5" y="7" width="10" height="3.5" rx="1.2" class="gold" transform="rotate(-40, 30.5, 8.75)"/>
    <!-- Impact mark (small star/dot) -->
    <circle cx="23" cy="17" r="1.3" class="gold"/>
  </g>

  <!-- FULL LOCKUP VERSION (icon + wordmark) -->
  <g id="lockup">
    <use href="#icon"/>

    <!-- Wordmark: Leilão + CRM -->
    <text x="54" y="32" class="wordmark">Leil&#227;o<tspan class="wordmark-accent">CRM</tspan></text>

    <!-- Gold accent underline -->
    <rect x="54" y="36.5" width="46" height="1.5" rx="0.75" class="gold" opacity="0.5"/>
  </g>
</svg>
