<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ImobLeilão CRM">
  <rect width="32" height="32" rx="7.5" fill="#1a3c34"/>
  <!-- House body: clean rectangle -->
  <rect x="7" y="15.5" width="18" height="11.5" rx="1" fill="#fff"/>
  <!-- Roof as gavel shape: thick angled stroke that reads as both roof peak AND hammer head -->
  <path d="M4 17L16 8L28 17" fill="none" stroke="#c8911f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gavel handle: extends diagonally from peak -->
  <line x1="16" y1="8" x2="24" y2="2.5" stroke="#c8911f" stroke-width="2" stroke-linecap="round"/>
  <!-- Impact arc: subtle curved line suggesting motion -->
  <path d="M25.5 4.5a3 3 0 0 1 1.5-2.5" fill="none" stroke="#c8911f" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Door: centered, rounded top -->
  <path d="M13 27v-5.5a2.5 2.5 0 0 1 5 0V27" fill="#1a3c34"/>
  <!-- Window left -->
  <rect x="8.5" y="17.5" width="3.5" height="3" rx="0.6" fill="#1a3c34" opacity="0.6"/>
  <!-- Window right -->
  <rect x="20" y="17.5" width="3.5" height="3" rx="0.6" fill="#1a3c34" opacity="0.6"/>
</svg>
