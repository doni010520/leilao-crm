<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ImobLeilão CRM">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3c34"/>
      <stop offset="100%" stop-color="#14302a"/>
    </linearGradient>
  </defs>
  <!-- Background: rounded square with subtle gradient -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Abstract house shape formed by negative space between "I" and "L" -->
  <!-- Vertical bar "I" = left wall of house -->
  <rect x="8" y="8" width="4.5" height="17" rx="1" fill="#ffffff"/>
  <!-- "L" shape = floor + right wall -->
  <rect x="8" y="21" width="16" height="4" rx="1" fill="#ffffff"/>
  <rect x="19.5" y="12" width="4.5" height="13" rx="1" fill="#ffffff"/>
  <!-- Roof: golden triangle/chevron on top connecting the two verticals -->
  <path d="M8 9.5L16 4L24 9.5" fill="none" stroke="#c8911f" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
